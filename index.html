<script>
/* =========================
   0) 공지/버전 (스케줄과 완전 분리)
========================= */
const APP_VERSION = "vFinal";

const NOTICE_LINES = [
  "월 ~ 토요일(특근) 조회 가능 / 일요일 휴무",
  "5/25 특근 반영"
];

function renderNotice(){
  document.getElementById("noticeCount").textContent = NOTICE_LINES.length;

  const el = document.getElementById("noticeBox");
  el.innerHTML = NOTICE_LINES.map(t =>
    `<div style="margin:4px 0;"><span class="tag">🍀</span> ${t}</div>`
  ).join("");

  document.getElementById("footerBox").textContent =
    `최종 수정일: ${LAST_UPDATED}`;
}

/* 공지 접기/펼치기 */
let noticeOpen = false;
function setNotice(open){
  noticeOpen = open;
  document.getElementById("noticeBody").style.display = open ? "block" : "none";
  document.getElementById("noticeArrow").textContent = open ? "▲" : "▼";
}
document.getElementById("noticeToggle").addEventListener("click", ()=>{
  setNotice(!noticeOpen);
});

/* =========================
   1) 날짜 유틸 (아이폰 안전)
========================= */
function parseDate(v){
  if(!v) return null;
  const [y,m,d] = v.split('-').map(Number);
  return new Date(y, m-1, d);
}
function pad2(n){ return String(n).padStart(2,'0'); }
function isoLocal(d){
  return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
}
function getDowKor(d){
  const days = ["일","월","화","수","목","금","토"];
  return days[d.getDay()];
}
function updateDowLabel(){
  const d = parseDate(document.getElementById("dayDate").value);
  const el = document.getElementById("dowLabel");
  el.textContent = d ? `(${getDowKor(d)})` : "";
}

/* =========================
   2) 기본 설정
========================= */
const START = parseDate("2026-01-05");

/* 휴무 */
const HOLIDAYS = ["2026-02-14","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-05-01","2026-05-02","2026-05-04","2026-05-05","2026-06-03"];

/* ✅ 라운드별 휴무(=그 라운드는 수행 안 함, 다음날로 이월) */
const ROUND_OFF = {
  "2026-01-22": [4],
  "2026-04-02": [4]
};

/* =========================
   3) 데이터 구간 (1/19 전/후)
========================= */

    "RH 휀다","RH B필라","R에어백투입","RH C필라","R A필라",
    "후드","3조1번","R도어탈거","하이드로닉체결","낚2","엔진어스",

    "응규","영환","상건","재덕","옥연","수신","오채","은우","정훈","용남",

  ],

function pickData(dateIso){

  if(dateIso >= DATA_V3.from) return DATA_V3;

  if(dateIso >= DATA_V2.from) return DATA_V2;

  return DATA_V1;
}

/* =========================
   ✅ 내 이름 저장/선택 (오름차순 선택)
========================= */
const MY_NAME_KEY = "t2b_my_name";

function getMyName(){
  return (localStorage.getItem(MY_NAME_KEY) || "").trim();
}

function setMyName(v){
  const name = (v || "").trim();
  if(!name){
    localStorage.removeItem(MY_NAME_KEY);
  }else{
    localStorage.setItem(MY_NAME_KEY, name);
  }
}

/* ✅ 현재 날짜 기준 명단을 오름차순으로 셀렉트에 넣기 */
function populateMyNameSelect(){
  const select = document.getElementById("myNameSelect");
  if(!select) return;

  // 기준 날짜: 현재 선택된 날짜가 있으면 그 날짜, 없으면 오늘
  const picked = parseDate(document.getElementById("dayDate").value) || new Date();
  const iso = isoLocal(picked);
  const data = pickData(iso);

  // 오름차순(가나다/abc) 정렬
  const names = [...data.workers].sort((a,b)=> a.localeCompare(b, "ko"));

  // 옵션 재구성
  select.innerHTML = `<option value="">(선택 안 함)</option>` + names.map(n=>(
    `<option value="${n}">${n}</option>`
  )).join("");

  // 저장된 값 있으면 선택 상태로
  const saved = getMyName();
  if(saved){
    // 명단에 없을 수도 있으니 존재할 때만 선택
    const opt = [...select.options].find(o=>o.value === saved);
    if(opt) select.value = saved;
  }else{
    select.value = "";
  }
}

function saveMyNameFromSelect(){
  const select = document.getElementById("myNameSelect");
  const v = select ? select.value : "";
  if(!v){
    setMyName("");
    alert("선택 안 함으로 저장(=삭제)");
  }else{
    setMyName(v);
    alert(`저장 완료~!`);
  }
  renderDay();
}

function clearMyName(){
  setMyName("");
  const select = document.getElementById("myNameSelect");
  if(select) select.value = "";
  alert("저장된 내 이름을 삭제함");
  renderDay();
}

/* =========================
   4) 근무/라운드휴무 판단
========================= */
function isWork(d){
  if(!d) return false;
  if(d < START) return false;
  if(d.getDay() === 0) return false; // 일요일 휴무
  return !HOLIDAYS.includes(isoLocal(d));
}
function isRoundOff(dateIso, roundNum){
  const arr = ROUND_OFF[dateIso];
  return !!(arr && arr.includes(roundNum));
}

/* =========================
   5) (휴무 라운드 제외) 누적 라운드 계산
========================= */
function roundsDoneBeforeDate(data, targetDate){
  const targetIso = isoLocal(targetDate);
  const baseD = parseDate(data.baseDate);
  if(!baseD) return 0;

  const forward = (targetDate >= baseD);
  let sum = 0;

  if(forward){
    let d = new Date(baseD.getTime());
    while(isoLocal(d) < targetIso){
      if(isWork(d)){
        const iso = isoLocal(d);
        let offCnt = 0;
        for(let r=1;r<=4;r++) if(isRoundOff(iso, r)) offCnt++;
        sum += (4 - offCnt);
      }
      d.setDate(d.getDate()+1);
    }
    return sum;
  } else {
    let d = new Date(targetDate.getTime());
    while(isoLocal(d) < isoLocal(baseD)){
      if(isWork(d)){
        const iso = isoLocal(d);
        let offCnt = 0;
        for(let r=1;r<=4;r++) if(isRoundOff(iso, r)) offCnt++;
        sum += (4 - offCnt);
      }
      d.setDate(d.getDate()+1);
    }
    return -sum;
  }
}

function performedIndexInDay(dateIso, roundNum){
  if(isRoundOff(dateIso, roundNum)) return null;
  let idx = 0;
  for(let r=1;r<roundNum;r++){
    if(!isRoundOff(dateIso, r)) idx++;
  }
  return idx;
}

/* =========================
   6) 스케줄 계산
========================= */
function getScheduleForDate(targetDate){
  if(!isWork(targetDate)) return null;

  const dateIso = isoLocal(targetDate);
  const data = pickData(dateIso);
  const workers = data.workers;
  const tasks = data.tasks;

  const baseTaskIdx = tasks.indexOf(data.baseTask);
  const basePersonIdx = workers.indexOf(data.basePerson);
  if(baseTaskIdx < 0 || basePersonIdx < 0) return null;

  const offsetRounds = roundsDoneBeforeDate(data, targetDate);

  return workers.map((name, personIdx)=>{
    const personDelta = personIdx - basePersonIdx;
    const rounds = [];

    for(let roundNum=1; roundNum<=4; roundNum++){
      const pi = performedIndexInDay(dateIso, roundNum);
      if(pi === null){
        rounds.push("휴무");
        continue;
      }
      const taskIdx = (baseTaskIdx + offsetRounds + personDelta + pi) % tasks.length;
      rounds.push(tasks[(taskIdx + tasks.length) % tasks.length]);
    }
    return { name, rounds };
  });
}

/* =========================
   7) 화면 출력
========================= */
function renderDay(){
  updateDowLabel();

  // ✅ 날짜 바뀔 때마다(또는 최초) 셀렉트 옵션 갱신
  populateMyNameSelect();

  const d = parseDate(document.getElementById("dayDate").value);
  const dayBody = document.getElementById("dayBody");
  const dayWarn = document.getElementById("dayWarn");
  dayBody.innerHTML = "";

  if(!d || !isWork(d)){
    dayWarn.textContent = "휴무일입니다.";
    return;
  }

  const s = getScheduleForDate(d);
  if(!s){
    dayWarn.textContent = "스케줄 계산에 문제가 있어요. (기준/명단/작업 순서 확인 필요)";
    return;
  }

  dayWarn.textContent = "";

  // ✅ 표 순서만 변경 (작업 배치는 그대로)
// ✅ 대현부터 시작해서 순서 정렬
const data = pickData(isoLocal(d));
const order = data.workers;

const startIdx = order.indexOf("대현");

const rotated = [
  ...order.slice(startIdx),
  ...order.slice(0, startIdx)
];

s.sort((a,b)=>{
  return rotated.indexOf(a.name) - rotated.indexOf(b.name);
});

  const myName = getMyName();

  s.forEach(r=>{
    const c1 = (r.rounds[0]==="휴무") ? "off" : "round-1";
    const c2 = (r.rounds[1]==="휴무") ? "off" : "round-2";
    const c3 = (r.rounds[2]==="휴무") ? "off" : "round-3";
    const c4 = (r.rounds[3]==="휴무") ? "off" : "round-4";

    const isMine = myName && (r.name === myName);

    dayBody.innerHTML += `
      <tr class="${isMine ? "my-row" : ""}">
        <td class="name-col">${r.name}</td>
        <td class="${c1}">${r.rounds[0]}</td>
        <td class="${c2}">${r.rounds[1]}</td>
        <td class="${c3}">${r.rounds[2]}</td>
        <td class="${c4}">${r.rounds[3]}</td>
      </tr>
    `;
  });

  // ✅ 행 탭하면 강조 (최대 3명까지 선택 가능 / 다시 누르면 해제)
  const rows = dayBody.querySelectorAll("tr");
  rows.forEach(tr=>{
    tr.addEventListener("click", ()=>{
      // 이미 선택된 줄이면 -> 해제
      if(tr.classList.contains("row-selected")){
        tr.classList.remove("row-selected");
        return;
      }

      // 선택된 줄이 3개 이상이면 -> 추가 선택 막기
      const selected = dayBody.querySelectorAll("tr.row-selected");
      if(selected.length >= 3){
        return;
      }

      // 아니면 -> 선택
      tr.classList.add("row-selected");
    });
  });
}

/* ✅ 처음 들어오면:
   - 오늘이 근무일이면 오늘
   - 휴무(일요일/공휴일)이면 다음 근무일(월~토, 공휴일 제외) */
function goToday(){
  let d = new Date();

  // 시간이 늦은 밤 등에서도 날짜만 쓰게 정규화
  d = new Date(d.getFullYear(), d.getMonth(), d.getDate());

  // ✅ 휴무면 다음 근무일로 이동
  let guard = 0;
  while(!isWork(d) && guard < 31){
    d.setDate(d.getDate() + 1);
    guard++;
  }

  // START 이전 날짜 방지 (혹시 모를 예외)
  if(d < START) d = new Date(START);

  document.getElementById("dayDate").value = isoLocal(d);
  updateDowLabel();

  // ✅ 셀렉트 먼저 채우고 렌더
  populateMyNameSelect();
  renderDay();
}

/* 날짜 바꾸면 요일 + 셀렉트 즉시 갱신 */
document.getElementById("dayDate").addEventListener("change", ()=>{

/* =========================
   ✅ 좌우 스와이프로 날짜 이동
========================= */
let touchStartX = 0;
let touchEndX = 0;
const SWIPE_THRESHOLD = 90; // 이 이상 밀어야 인식(px)

/* 다음/이전 근무일 계산 */
function moveWorkDay(delta){
  let d = parseDate(document.getElementById("dayDate").value);
  if(!d) return;

  let guard = 0;
  do{
    d.setDate(d.getDate() + delta);
    guard++;
  }while(!isWork(d) && guard < 31);

  document.getElementById("dayDate").value = isoLocal(d);
  updateDowLabel();
    /* ✅ 날짜 바뀐 시각적 피드백 */
  const row = document.querySelector(".date-row");
  if(row){
    row.classList.remove("date-flash");
    void row.offsetWidth; // 애니메이션 다시 실행용
    row.classList.add("date-flash");
  }
  
  
  
  renderDay();
}

/* 터치 시작 */
document.addEventListener("touchstart", (e)=>{
  if(e.touches.length !== 1) return;
  touchStartX = e.touches[0].clientX;
}, { passive:true });

/* 터치 종료 */
document.addEventListener("touchend", (e)=>{
  touchEndX = e.changedTouches[0].clientX;
  handleSwipe();
}, { passive:true });

function handleSwipe(){
  const diff = touchEndX - touchStartX;

  if(Math.abs(diff) < SWIPE_THRESHOLD) return;

  if(diff < 0){
    // 👉 왼쪽으로 스와이프 → 다음날
    moveWorkDay(+1);
  }else{
    // 👉 오른쪽으로 스와이프 → 이전날
    moveWorkDay(-1);
  }
}



goToday();
