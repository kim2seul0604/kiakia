<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>트림2반 작업 스케줄 조회</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="T2B">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
/* 👉 기존 스타일 그대로 유지 (생략 없이 사용) */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#222;}
.container{max-width:960px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:16px;box-shadow:0 6px 16px rgba(0,0,0,.06);}
h2{font-size:16px;margin:0 0 10px;text-align:center;}
input, select{padding:6px 10px;font-size:14px;border-radius:8px;border:1px solid #ccc;}
button.primary{padding:8px 16px;border-radius:999px;border:none;background:#007aff;color:#fff;}
button.ghost{padding:8px 12px;border-radius:999px;border:1px solid #d7d7db;background:#fff;color:#111;}
.warning{color:#c00;font-size:13px;margin-top:6px;text-align:center;}
.date-row{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.dow{font-size:15px;color:#888;margin-left:6px;}
.table-wrap{overflow-x:auto;margin-top:8px;}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:12px;}
th,td{padding:4px;border-bottom:1px solid #eee;text-align:center;}
th{background:#fafafa;}
.name-col{position:sticky;left:0;background:#f3f4f6;font-weight:700;width:48px;}
.off{color:#c00;font-weight:800;}
.round-1{color:#4c1d95;} .round-2{color:#1e40af;}
.round-3{color:#0f766e;} .round-4{color:#334155;}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h2>🌺🌼 트림 2반 작업 스케줄 조회 🌸🌼</h2>

    <div class="date-row">
      <input type="date" id="dayDate">
      <span id="dowLabel" class="dow"></span>
      <button class="primary" onclick="renderDay()">조회</button>
    </div>

    <div id="dayWarn" class="warning"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="name-col">이름</th>
            <th>1R</th>
            <th>2R</th>
            <th>3R</th>
            <th>4R</th>
          </tr>
        </thead>
        <tbody id="dayBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>

/* ✅ 최초 1회 팝업 */
const NOTICE_POPUP_KEY = "t2b_notice_20260506";
function showUpdatePopupOnce(){
  if(!localStorage.getItem(NOTICE_POPUP_KEY)){
    alert("📢 5/6 이후 고정(AS커버, 족장) 반영 완료");
    localStorage.setItem(NOTICE_POPUP_KEY,"yes");
  }
}

/* 날짜 */
function parseDate(v){
  const [y,m,d] = v.split('-').map(Number);
  return new Date(y,m-1,d);
}
function isoLocal(d){
  return d.toISOString().slice(0,10);
}

/* 기본 */
const START = parseDate("2026-01-05");

/* 데이터 */
const DATA_V2 = {
  from:"2026-01-19",
  baseDate:"2026-01-19",
  baseTask:"LH휀다",
  basePerson:"상건",
  workers:[
    "영훈","갑수","기백","우빈","승호","웅기","학현","범성","성해",
    "응규","영환","상건","재덕","옥연","수신","오채","은우","정훈","용남",
    "성훈","원빈","길운","대현","진솔","준현","문정","서진","이슬","민국","성천","충훈"
  ],
  tasks:[
    "LH휀다","LH B필라","L에어백투입","2조1번","LH C필라",
    "SK주유구","멤버어스","LH A필라","마스터백","L도어탈거",
    "낚1","범퍼가이드","2조2번","AS커버","족장(SCU)","LH 루1","LH 루2",
    "RH 휀다","RH B필라","R에어백투입","RH C필라","R A필라",
    "후드","3조1번","R도어탈거","하이드로닉체결","낚2","엔진어스",
    "3조2번","RH 루1","RH 루2"
  ]
};

/* ✅ 5/6 이후 */
const DATA_V3 = {
  from:"2026-05-06",
  baseDate:"2026-01-19",
  baseTask:"LH휀다",
  basePerson:"상건",
  workers:[
    "영훈","갑수","기백","우빈",
    "학현","범성","성해",
    "응규","영환","상건","재덕","옥연","수신","오채","은우","정훈","용남",
    "성훈","원빈","길운","대현","진솔","준현","승호","서진","이슬","민국","성천","충훈"
  ],
  tasks:[
    "LH휀다","LH B필라","L에어백투입","2조1번","LH C필라",
    "SK주유구","멤버어스","LH A필라","마스터백","L도어탈거",
    "낚1","범퍼가이드","2조2번",
    "LH 루1","LH 루2",
    "RH 휀다","RH B필라","R에어백투입","RH C필라","R A필라",
    "후드","3조1번","R도어탈거","하이드로닉체결","낚2","엔진어스",
    "3조2번","RH 루1","RH 루2"
  ]
};

/* 데이터 선택 */
function pickData(dateIso){
  if(dateIso >= DATA_V3.from) return DATA_V3;
  return DATA_V2;
}

/* 계산 */
function getSchedule(date){
  const iso = isoLocal(date);
  const data = pickData(iso);

  return data.workers.map((name,i)=>{
    return {
      name,
      rounds:[
        data.tasks[(i)%data.tasks.length],
        data.tasks[(i+1)%data.tasks.length],
        data.tasks[(i+2)%data.tasks.length],
        data.tasks[(i+3)%data.tasks.length]
      ]
    };
  });
}

/* 출력 */
function renderDay(){
  const d = parseDate(document.getElementById("dayDate").value);
  const body = document.getElementById("dayBody");
  body.innerHTML="";

  const s = getSchedule(d);

  s.forEach(r=>{
    body.innerHTML += `
    <tr>
      <td class="name-col">${r.name}</td>
      <td>${r.rounds[0]}</td>
      <td>${r.rounds[1]}</td>
      <td>${r.rounds[2]}</td>
      <td>${r.rounds[3]}</td>
    </tr>`;
  });
}

/* 최초 실행 */
function goToday(){
  const d = new Date();
  document.getElementById("dayDate").value = isoLocal(d);
  renderDay();
}

/* 실행 */
showUpdatePopupOnce();
goToday();

</script>

</body>
</html>
