<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>커피 주문</title>

<style>

body{
font-family:-apple-system;
background:#f5f6f8;
padding:20px;
margin:0;
}

h1{
text-align:center;
margin-bottom:25px;
}

.person{
background:white;
padding:16px;
margin-bottom:10px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

input[type="checkbox"]{
width:22px;
height:22px;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
margin-top:10px;
}

.calc{
background:#007aff;
color:white;
}

.reset{
background:#e5e5ea;
}

.result{
background:white;
margin-top:20px;
padding:20px;
border-radius:12px;
font-size:18px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.total{
margin-top:15px;
padding-top:15px;
border-top:1px solid #eee;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>☕ 커피 주문</h1>

<div id="list"></div>

<button class="calc" onclick="calc()">주문 조회</button>
<button class="reset" onclick="resetAll()">전체 초기화</button>

<div class="result" id="result">
조회 버튼을 누르면 주문이 계산됩니다.
</div>

<script>

const people=[

{name:"반장",drink:"작은아아"},
{name:"민근",drink:"ICE바닐라라떼"},
{name:"형원",drink:"아아"},
{name:"정무",drink:"ICE바닐라라떼"},
{name:"재권",drink:"아아"},
{name:"범성",drink:"아아"},
{name:"학현",drink:"아아"},
{name:"진솔",drink:"아아"},
{name:"응규",drink:"아이스티"},
{name:"기백",drink:"아이스티"},
{name:"서진",drink:"아아"},
{name:"이슬",drink:"아아"},
{name:"원빈",drink:"아아"},
{name:"대현",drink:"아아"},
{name:"민국",drink:"아아"},
{name:"정훈",drink:"아아"}

];

const price={

"아아":2000,
"작은아아":1500,
"ICE바닐라라떼":2800,
"아이스티":3000

};

const list=document.getElementById("list");

people.forEach((p,i)=>{

const div=document.createElement("div");

div.className="person";

div.innerHTML=`
<span>${p.name} - ${p.drink}</span>
<input type="checkbox">
`;

list.appendChild(div);

});

function calc(){

let result={};
let total=0;
let totalPrice=0;

document.querySelectorAll(".person").forEach((row,i)=>{

const checked=row.querySelector("input").checked;

if(!checked){

let drink=people[i].drink;

if(!result[drink]){
result[drink]=0;
}

result[drink]++;

total++;
totalPrice+=price[drink];

}

});

let text="";

for(let d in result){

text+=`${d} : ${result[d]}잔<br>`;

}

text+=`
<div class="total">
총 주문 : ${total}잔<br>
총 금액 : ${totalPrice.toLocaleString()}원
</div>
`;

document.getElementById("result").innerHTML=text;

}

function resetAll(){

document.querySelectorAll("input").forEach(i=>i.checked=false);

document.getElementById("result").innerHTML="조회 버튼을 누르면 주문이 계산됩니다.";

}

</script>

</body>
</html>
