<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커피 주문</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:6px;
}

.notice{
font-size:15px;
font-weight:700;
margin-bottom:6px;
}

.people{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
}

.person{
background:white;
border-radius:6px;
padding:6px;
font-size:13px;
text-align:center;
cursor:pointer;
user-select:none;
}

.person.off{
background:#ddd;
color:#777;
}

.result{
margin-top:6px;
background:white;
border-radius:6px;
padding:6px;
font-size:14px;
line-height:1.4;
font-weight:600;
}

</style>
</head>

<body>

<div class="notice">주문에서 뺄 사람을 누르세요</div>

<div class="people" id="people"></div>

<div class="result" id="result"></div>

<script>

const data=[
{name:"이슬",menu:"아아 연하게"},
{name:"서진",menu:"아아 연하게"},
{name:"민수",menu:"아아"},
{name:"지훈",menu:"라떼"},
{name:"유진",menu:"아아"},
{name:"수현",menu:"바닐라라떼"}
]

const peopleDiv=document.getElementById("people")

data.forEach((p,i)=>{

const div=document.createElement("div")
div.className="person"
div.innerText=p.name+" ("+p.menu+")"

div.onclick=()=>{
div.classList.toggle("off")
update()
}

peopleDiv.appendChild(div)

})

function update(){

const persons=document.querySelectorAll(".person")
const result={}

persons.forEach((p,i)=>{

if(!p.classList.contains("off")){

const menu=data[i].menu
result[menu]=(result[menu]||0)+1

}

})

let text=""

for(let m in result){
text+=m+" "+result[m]+"잔<br>"
}

document.getElementById("result").innerHTML=text

}

update()

</script>

</body>
</html>
