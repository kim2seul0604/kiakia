<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>커피 주문</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f4f4;
margin:0;
padding:12px;
max-width:520px;
margin:auto;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}

.people{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.person{
background:white;
border-radius:12px;
padding:14px 6px;
text-align:center;
font-size:14px;
font-weight:600;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.person small{
display:block;
font-weight:400;
font-size:12px;
margin-top:4px;
color:#666;
}

.person.off{
background:#dcdcdc;
color:#888;
text-decoration:line-through;
}

.result{
margin-top:14px;
background:white;
border-radius:12px;
padding:14px;
font-size:16px;
font-weight:600;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.copy{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#333;
color:white;
font-size:15px;
font-weight:600;
}

</style>
</head>

<body>

<div class="title">주문에서 뺄 사람을 누르세요</div>

<div class="people" id="people"></div>

<div class="result" id="result"></div>

<button class="copy" onclick="copyOrder()">주문 복사</button>

<script>

const data=[
{name:"이슬",menu:"아아 연하게"},
{name:"서진",menu:"아아 연하게"},
{name:"민수",menu:"아아"},
{name:"지훈",menu:"라떼"},
{name:"유진",menu:"아아"},
{name:"수현",menu:"바닐라라떼"}
]

const peopleDiv=document.getElementById("people")

data.forEach((p,i)=>{

const div=document.createElement("div")
div.className="person"

div.innerHTML=p.name+"<small>☕ "+p.menu+"</small>"

div.onclick=()=>{
div.classList.toggle("off")
update()
}

peopleDiv.appendChild(div)

})

function update(){

const persons=document.querySelectorAll(".person")
const result={}

persons.forEach((p,i)=>{

if(!p.classList.contains("off")){

const menu=data[i].menu
result[menu]=(result[menu]||0)+1

}

})

let text="☕ 주문 결과<br><br>"
let copyText=""

for(let m in result){

text+=m+" "+result[m]+"잔<br>"
copyText+=m+" "+result[m]+"잔\n"

}

document.getElementById("result").innerHTML=text
window.orderText=copyText

}

function copyOrder(){

navigator.clipboard.writeText(window.orderText)
alert("주문이 복사되었습니다")

}

update()

</script>

</body>
</html>
